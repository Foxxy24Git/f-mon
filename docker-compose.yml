# F-mon — Fase 3: db + app + worker, satu image untuk app & worker.
services:
  db:
    image: postgres:16
    container_name: fmon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fmon
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fmon
    ports:
      # host:container — biar Prisma di mesin lokal bisa connect ke localhost:5432
      # DB_PORT bisa dioverride lewat .env kalau port 5432 di host sudah dipakai
      # (mis. VM yang juga menjalankan aplikasi lain).
      - "${DB_PORT:-5432}:5432"
    volumes:
      - fmon-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fmon -d fmon"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: fmon-app
    restart: unless-stopped
    env_file: .env
    environment:
      # di dalam network Docker, host DB adalah nama service `db`, bukan localhost
      DATABASE_URL: postgresql://fmon:password@db:5432/fmon
    volumes:
      # npm script app pakai `node --env-file=.env`, butuh file .env fisik di container
      # (bukan cuma env var) — mount read-only, tidak ikut ke image build
      - ./.env:/app/.env:ro
    ports:
      # APP_PORT bisa dioverride lewat .env kalau port 3000 di host sudah dipakai.
      - "${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  worker:
    build: .
    container_name: fmon-worker
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://fmon:password@db:5432/fmon
    volumes:
      - ./.env:/app/.env:ro
    cap_add:
      # fping butuh raw socket (CLAUDE.md §7)
      - NET_RAW
    depends_on:
      db:
        condition: service_healthy

volumes:
  fmon-pgdata:
